[rewrite_local]
# 全局广告拦截
^https?:\/\/.*\.(ad|ads|advert|adx|adserver)\..* url reject

# 抖音主APP去广告
^https?:\/\/.*\.pangle\.com\/.* url reject
^https?:\/\/.*\.snssdk\.com\/.*\/ad\/.* url reject
^https?:\/\/.*\.snssdk\.com\/aweme\/v1\/feed\/.* url script-response-body "try{var b=JSON.parse($response.body);b.aweme_list=b.aweme_list.filter(i=>!i.is_ads&&!i.is_ad);$done({body:JSON.stringify(b)})}catch(e){$done({})}"
^https?:\/\/.*\.snssdk\.com\/.*creative.* url reject
^https?:\/\/.*\.pstatp\.com\/.* url reject

# 抖音短剧解锁全集 + 跳过广告
^https?:\/\/.*\.snssdk\.com\/aweme\/v1\/drama\/.* url script-response-body "try{var body=$response.body;body=body.replace(/\"need_watch_ad\":\d/g,'\"need_watch_ad\":0').replace(/\"need_pay\":\d/g,'\"need_pay\":0').replace(/\"is_paid\":\d/g,'\"is_paid\":1');$done({body})}catch(e){$done({})}"
^https?:\/\/.*\.snssdk\.com\/aweme\/v1\/webcast\/aweme\/info\/.* url script-response-body "try{var body=$response.body;body=body.replace(/\"need_watch_ad\":\d/g,'\"need_watch_ad\":0').replace(/\"need_pay\":\d/g,'\"need_pay\":0');$done({body})}catch(e){$done({})}"
^https?:\/\/.*\.snssdk\.com\/.*reward.*ad.* url reject

# 京东去广告
^https?:\/\/api\.m\.jd\.com.*functionId=queryAdInfo.* url reject
^https?:\/\/api\.m\.jd\.com.*functionId=querySplashAd.* url reject

[mitm]
hostname = *.snssdk.com,*.pangle.com,*.pstatp.com,api.m.jd.com
