[rewrite_local]

# 全局广告拦截
^https?:\/\/.*\.(ad|ads|advert|adx)\..* url reject

# 抖音去广告
^https?:\/\/.*\.pangle\.com\/.* url reject
^https?:\/\/.*\.snssdk\.com\/.*ad.* url reject
^https?:\/\/.*\.pstatp\.com\/.* url reject

# 抖音主页去广告
^https?:\/\/.*\.snssdk\.com\/aweme\/v1\/feed\/.* url script-response-body "try{var a=JSON.parse($response.body);a.aweme_list=a.aweme_list||[];var b=[];for(var i in a.aweme_list){if(!a.aweme_list[i].is_ads&&!a.aweme_list[i].is_ad)b.push(a.aweme_list[i])}a.aweme_list=b;$done({body:JSON.stringify(a)})}catch(e){$done({})}"

# 抖音短剧解锁 全集 + 跳过广告
^https?:\/\/.*\.snssdk\.com\/aweme\/v1\/drama\/.* url script-response-body "try{var a=$response.body;a=a.replace(/\"need_watch_ad\":\d/g,'\"need_watch_ad\":0');a=a.replace(/\"need_pay\":\d/g,'\"need_pay\":0');a=a.replace(/\"is_paid\":\d/g,'\"is_paid\":1');$done({body:a})}catch(e){$done({})}"

# 短剧广告拦截
^https?:\/\/.*\.snssdk\.com\/.*reward.* url reject

[mitm]
hostname = *.snssdk.com,*.pangle.com,*.pstatp.com
